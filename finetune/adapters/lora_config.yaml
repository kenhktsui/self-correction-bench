model: "meta-llama/Llama-3.1-8B-Instruct"
train: true
data: "finetune/data"
adapter_path: "finetune/adapters"
lora_layers: 16
lora_parameters:
  rank: 16
  alpha: 32.0
  scale: 10.0
  dropout: 0.0
batch_size: 2
iters: 5306
learning_rate: 5e-05
lr_schedule:
  name: "cosine_decay"
  arguments: [5e-05, 5206, 5e-06]
  warmup: 100
  warmup_init: 0.0
max_seq_length: 1024
grad_checkpoint: true
steps_per_eval: 100
steps_per_report: 10
save_every: 1000
val_batches: 25
seed: 42
